services:
  web-asset-build:
    build:
      context: .
      target: build-assets
    volumes:
      - './root/static/:/build/root/static/'
      - 'web-assets:/build/root/assets/'
    command: ['./build-assets.mjs', '--watch']
    develop:
      watch:
        - path: ./build-assets.mjs
          action: rebuild
        - path: ./package.json
          action: rebuild
  web-server:
    build:
      context: .
      target: develop
    volumes:
      - './:/app/'
      - 'web-assets:/app/root/assets/'
      - '/app/local'
    ports:
      - '${HOST_PORT:-5001}:8000'
    environment:
      # default is 120, shorten to work with compose label
      COLUMNS: 96
    depends_on:
      - web-asset-build
    develop:
      watch:
        - path: ./cpanfile
          action: rebuild
  test:
    profiles:
      - test
    build:
      context: .
      target: lint
      secrets:
        - github_token
    volumes:
      - './:/app/'
      - 'web-assets:/app/root/assets/'
      - '/app/local'
      - '/app/node_modules'
      - '${GIT_COMMON_DIR:-/dev/null}:${GIT_COMMON_DIR:-/dev/null}:ro'
    environment:
      COLUMNS: 96
    init: true
    stdin_open: true
    tty: true
    depends_on:
      - web-asset-build
    command: ['prove', '-lvr', 't']
  playwright:
    profiles:
      - test
    build:
      context: .
      target: playwright-test
    volumes:
      - './e2e/:/app/e2e/'
      - './playwright.config.ts:/app/playwright.config.ts'
    environment:
      PLAYWRIGHT_BASE_URL: http://web-server:8000
    depends_on:
      - web-server
secrets:
  github_token:
    environment: GITHUB_TOKEN
volumes:
  web-assets:
